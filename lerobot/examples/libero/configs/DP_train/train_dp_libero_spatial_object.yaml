# Diffusion Policy training on LIBERO-Spatial + LIBERO-Object (merged)
# Raw teleop actions, no language conditioning
#
# Usage:
#   PYTHONPATH=/scratch/mdorazi/Skill_Boundary_Detector/lerobot/src \
#     lerobot-train \
#     --config_path examples/libero/configs/DP_train/train_dp_libero_spatial_object.yaml

dataset:
  repo_id: mdorazi/libero_spatial_object
  root: /scratch/mdorazi/Skill_Boundary_Detector/libero_dataset/libero_spatial_object
  video_backend: pyav

policy:
  type: diffusion
  device: cuda
  push_to_hub: false

  # Temporal settings
  n_obs_steps: 5      # 5 frames @ 20fps = 250ms history
  horizon: 16         # UNet prediction length (must be divisible by 2^len(down_dims)=8)
  n_action_steps: 8   # action chunk length actually executed

  # UNet architecture
  down_dims: [512, 1024, 2048]

# Training
batch_size: 64
steps: 200000
num_workers: 4
seed: 42

# Logging & checkpointing
log_freq: 200
save_freq: 20000
eval_freq: 0

output_dir: /scratch/mdorazi/Skill_Boundary_Detector/outputs/dp_libero_spatial_object

wandb:
  enable: true
  project: lerobot_libero